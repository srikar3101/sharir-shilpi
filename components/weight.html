<div id="screen-weight" class="screen">
  <div class="screen-container">
    <header class="screen-header">
      <div>
        <h1>Weight</h1>
        <p class="screen-sub">Log & track your progress</p>
      </div>
    </header>

    <div class="grid-main">
      <div class="main-column">
        <div class="card" style="margin-bottom: 24px;">
          <div class="card-label">Log today's weight</div>
          <div style="display:flex; gap:12px; align-items:flex-end;">
            <div class="form-group" style="flex:1; margin-bottom:0;">
              <label class="form-label">Weight (kg)</label>
              <input class="form-input" id="w-input" type="number" step="0.1" placeholder="82.5" />
            </div>
            <button class="btn btn-primary" onclick="window.app.logWeight()" style="height:44px;">Log</button>
          </div>
        </div>

        <div class="card">
          <div class="card-label">Progress chart (last 14 days)</div>
          <div style="height:240px; position:relative; width:100%;">
            <canvas id="weight-chart"></canvas>
          </div>
        </div>
      </div>

      <div class="side-column">
        <div class="card">
          <div class="card-label">History</div>
          <div id="weight-history" style="display:flex; flex-direction:column; gap:12px;">
            <div class="text-muted" style="padding:20px 0;">No entries yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
