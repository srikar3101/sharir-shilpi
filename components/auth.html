<div id="auth-screen">
  <div class="card auth-card">
    <div style="text-align: center; margin-bottom: 32px; padding: 0 8px;">
      <h1 class="sidebar-logo" style="padding:0; margin-bottom:8px; font-size:32px; word-break: break-all;">Sharir Shilpi</h1>
      <p style="color:var(--text-secondary); font-size:15px;">Authenticate to begin your journey.</p>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@example.com" />
        <div class="form-error" id="login-email-error" style="color:var(--accent-error); font-size:12px; margin-top:4px;"></div>
      </div>
      <div class="form-group" style="margin-top: 16px;">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-pass" type="password" placeholder="••••••••" />
        <div class="form-error" id="login-pass-error" style="color:var(--accent-error); font-size:12px; margin-top:4px;"></div>
      </div>
      <button class="btn btn-primary btn-flow magnetic w-100" style="margin-top: 24px;" onclick="window.app.handleLogin()">Login</button>
      <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
        Don't have an account? <span style="color: var(--accent-primary); cursor: pointer; font-weight: 600;" onclick="window.app.toggleAuthMode('register')">Register</span>
      </p>
    </div>

    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="reg-name" type="text" placeholder="Srikar" />
      </div>
      <div class="form-group" style="margin-top: 16px;">
        <label class="form-label">Email</label>
        <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group" style="margin-top: 16px;">
        <label class="form-label">Password</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-flow magnetic w-100" style="margin-top: 24px;" onclick="window.app.handleRegister()">Create Account</button>
      <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-secondary);">
        Already have an account? <span style="color: var(--accent-primary); cursor: pointer; font-weight: 600;" onclick="window.app.toggleAuthMode('login')">Login</span>
      </p>
    </div>
  </div>
</div>
