<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Sharir Shilpi" />
  <meta name="theme-color" content="#f2ede6" />
  <meta name="description" content="Your daily body shaping companion." />
  <title>Sharir Shilpi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Space+Grotesk:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- ANIMATION LIBRARIES -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>

<body>
  <!-- BACKGROUND CANVAS -->
  <canvas id="bg-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>

  <!-- LOADING INDICATOR -->
  <div id="app-loader" class="app-loader">
     <div class="loader-spinner"></div>
     <span>Sculpting your experience...</span>
  </div>

  <!-- COMPONENT CONTAINERS -->
  <div id="auth-container" class="hidden"></div>
  <div id="onboarding-container" class="hidden"></div>

  <!-- MAIN APP CONTAINER -->
  <div id="main-app" class="hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo magnetic">Sharir Shilpi</div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Sidebar items injected by JS -->
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" onclick="window.app.toggleTheme()">
          <span id="theme-icon-sidebar">🌙</span>
          <span>Appearance</span>
        </button>
        <button class="btn btn-secondary btn-sm" onclick="window.app.resetApp()">Reset App</button>
      </div>
    </aside>

    <main class="main-content" id="main-content">
       <!-- Screens injected here -->
    </main>

    <!-- MOBILE TAB BAR -->
    <nav class="tab-bar" id="mobile-tabs">
       <!-- Tab buttons injected here -->
    </nav>
  </div>

  <!-- MODALS CONTAINER -->
  <div id="modals-container"></div>

  <!-- TOAST NOTIFICATIONS -->
  <div class="toast" id="toast"></div>

  <!-- APP CONFIG & ENTRY -->
  <script src="js/service.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
  <script src="js/animations.js" type="module"></script>
</body>
</html>
